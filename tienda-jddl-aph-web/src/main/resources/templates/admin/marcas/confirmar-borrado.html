<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/head :: head('Eliminar marca')}"></head>
<body>

<div th:replace="~{admin/fragments/header :: header}"></div>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

            <h1 class="h2 mb-4">
                <i class="bi bi-trash me-2 text-danger"></i>Eliminar marca
            </h1>

            <div th:if="${error}" class="alert alert-danger d-flex align-items-center mb-4" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${error}"></span>
            </div>

            <div class="card border-danger" style="max-width:500px;">
                <div class="card-body p-4">
                    <p class="fs-5 mb-1 text-white">¿Seguro que desea borrar la categoría?</p>
                    <p class="fw-bold text-white fs-4 mb-4" th:text="${marca.nombre}">Nombre</p>

                    <form th:action="@{/admin/marcas/{id}/delete(id=${marca.id})}" method="post">
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-danger">
                                <i class="bi bi-trash me-1"></i>Sí, eliminar
                            </button>
                            <a th:href="@{/admin/marcas}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-1"></i>Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>

        </main>
    </div>
</div>

</body>
</html>
