<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/head :: head('Marcas')}"></head>
<body>

<div th:replace="~{admin/fragments/header :: header}"></div>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h2 mb-0"><i class="bi bi-tag me-2 text-primary"></i>Marcas</h1>
                <a href="/admin/marcas/new" class="btn btn-primary">
                    <i class="bi bi-plus-lg me-1"></i>Nueva marca
                </a>
            </div>

            <div class="table-responsive rounded-3" style="border:1px solid #2a2a2a;">
                <table class="table table-dark table-hover mb-0" aria-label="Listado de marcas">
                    <thead class="table-dark border-bottom border-secondary">
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Nombre</th>
                        <th scope="col"><span class="visually-hidden">Acciones</span></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="marca : ${marcas}">
                        <td th:text="${marca.id}"></td>
                        <td th:text="${marca.nombre}"></td>
                        <td th:replace="~{admin/fragments/btn-acciones :: acciones('marcas', ${marca.id})}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(marcas)}">
                        <td colspan="3" class="text-center text-muted py-4">No hay marcas registradas.</td>
                    </tr>
                    </tbody>
                    <tfoot class="border-top border-secondary">
                    <tr>
                        <td colspan="3" class="text-muted small py-2">
                            Total: <span th:text="${#lists.size(marcas)}">0</span> marcas
                        </td>
                    </tr>
                    </tfoot>
                </table>
            </div>

            <div class="mt-3">
                <a href="/admin/marcas/new" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-plus-lg me-1"></i>Nueva marca
                </a>
            </div>

        </main>
    </div>
</div>

</body>
</html>
