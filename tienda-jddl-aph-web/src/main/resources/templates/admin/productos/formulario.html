<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/head :: head('Nuevo producto')}"></head>
<body>

<div th:replace="~{admin/fragments/header :: header}"></div>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

            <h1 class="h2 mb-4"><i class="bi bi-box-seam me-2 text-success"></i>Nuevo producto</h1>

            <div th:if="${error}" class="alert alert-danger d-flex align-items-center mb-4" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${error}"></span>
            </div>

            <div class="card border-secondary" style="max-width:700px;">
                <div class="card-body p-4">
                    <form th:action="@{/admin/productos/new}" th:object="${producto}" method="post">

                        <input type="hidden" th:field="*{id}">

                        <div class="row g-3">

                            <div class="col-md-8">
                                <label for="nombre" class="form-label text-white">Nombre <span class="text-danger">*</span></label>
                                <input type="text" id="nombre" th:field="*{nombre}"
                                       class="form-control bg-dark text-white border-secondary"
                                       placeholder="Nombre del producto">
                            </div>

                            <div class="col-md-4">
                                <label for="codigo" class="form-label text-white">Código EAN <span class="text-danger">*</span></label>
                                <input type="text" id="codigo" th:field="*{codigo}"
                                       class="form-control bg-dark text-white border-secondary"
                                       placeholder="0000000000000">
                            </div>

                            <div class="col-12">
                                <label for="descripcion" class="form-label text-white">Descripción <span class="text-danger">*</span></label>
                                <textarea id="descripcion" th:field="*{descripcion}" rows="3"
                                          class="form-control bg-dark text-white border-secondary"
                                          placeholder="Descripción del producto"></textarea>
                            </div>

                            <div class="col-md-4">
                                <label for="precio" class="form-label text-white">Precio (€) <span class="text-danger">*</span></label>
                                <input type="number" id="precio" th:field="*{precio}" step="0.01" min="0"
                                       class="form-control bg-dark text-white border-secondary"
                                       placeholder="0.00">
                            </div>

                            <div class="col-md-4">
                                <label for="descuento" class="form-label text-white">Descuento (%)</label>
                                <input type="number" id="descuento" th:field="*{descuento}" min="0" max="100"
                                       class="form-control bg-dark text-white border-secondary"
                                       placeholder="0">
                            </div>

                            <div class="col-md-4">
                                <label for="imagen" class="form-label text-white">Imagen</label>
                                <input type="text" id="imagen" th:field="*{imagen}"
                                       class="form-control bg-dark text-white border-secondary"
                                       placeholder="ej: zapatilla.jpg">
                            </div>

                            <!-- MARCA: sin th:field, solo name="marcaId" -->
                            <div class="col-md-6">
                                <label for="marcaId" class="form-label text-white">Marca <span class="text-danger">*</span></label>
                                <select id="marcaId" name="marcaId"
                                        class="form-select bg-dark text-white border-secondary">
                                    <option value="">-- Selecciona una marca --</option>
                                    <option th:each="m : ${marcas}"
                                            th:value="${m.id}"
                                            th:text="${m.nombre}"
                                            th:selected="${producto.marca != null and producto.marca.id == m.id}">
                                    </option>
                                </select>
                            </div>

                            <!-- CATEGORÍAS: sin th:field, solo name="categoriasIds" -->
                            <div class="col-md-6">
                                <label class="form-label text-white">Categorías</label>
                                <div class="p-2 rounded border border-secondary" style="max-height:160px; overflow-y:auto;">
                                    <div th:each="cat : ${categorias}" class="form-check">
                                        <input class="form-check-input" type="checkbox"
                                               name="categoriasIds"
                                               th:value="${cat.id}"
                                               th:checked="${producto.categorias != null and producto.categorias.contains(cat)}"
                                               th:id="'cat-' + ${cat.id}">
                                        <label class="form-check-label"
                                               th:for="'cat-' + ${cat.id}"
                                               th:text="${cat.nombre}"></label>
                                    </div>
                                </div>
                            </div>

                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i>Guardar
                            </button>
                            <a th:href="@{/admin/productos}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-1"></i>Cancelar
                            </a>
                        </div>

                    </form>
                </div>
            </div>

        </main>
    </div>
</div>

</body>
</html>
