<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/head :: head('Productos')}"></head>
<body>

<div th:replace="~{admin/fragments/header :: header}"></div>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h2 mb-0"><i class="bi bi-box-seam me-2 text-success"></i>Productos</h1>
                <a href="/admin/productos/new" class="btn btn-primary">
                    <i class="bi bi-plus-lg me-1"></i>Nuevo producto
                </a>
            </div>

            <div class="table-responsive rounded-3" style="border:1px solid #2a2a2a;">
                <table class="table table-dark table-hover mb-0" aria-label="Listado de productos">
                    <thead class="table-dark border-bottom border-secondary">
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Nombre</th>
                        <th scope="col">Marca</th>
                        <th scope="col">Precio</th>
                        <th scope="col">Dto.</th>
                        <th scope="col">Categorías</th>
                        <th scope="col"><span class="visually-hidden">Acciones</span></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="producto : ${productos}">
                        <td th:text="${producto.id}"></td>
                        <td th:text="${producto.nombre}"></td>
                        <td th:text="${producto.marca != null ? producto.marca.nombre : '—'}"></td>
                        <td th:text="${#numbers.formatDecimal(producto.precio, 1, 2)} + ' €'"></td>
                        <td>
                <span th:if="${producto.descuento > 0}"
                      class="badge bg-danger" th:text="${producto.descuento} + '%'"></span>
                            <span th:if="${producto.descuento == 0}" class="text-muted">—</span>
                        </td>
                        <td th:text="${#lists.size(producto.categorias)}"></td>
                        <td th:replace="~{admin/fragments/btn-acciones :: acciones('productos', ${producto.id})}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(productos)}">
                        <td colspan="7" class="text-center text-muted py-4">No hay productos registrados.</td>
                    </tr>
                    </tbody>
                    <tfoot class="border-top border-secondary">
                    <tr>
                        <td colspan="7" class="text-muted small py-2">
                            Total: <span th:text="${#lists.size(productos)}">0</span> productos
                        </td>
                    </tr>
                    </tfoot>
                </table>
            </div>

            <div class="mt-3">
                <a href="/admin/productos/new" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-plus-lg me-1"></i>Nuevo producto
                </a>
            </div>

        </main>
    </div>
</div>

</body>
</html>
