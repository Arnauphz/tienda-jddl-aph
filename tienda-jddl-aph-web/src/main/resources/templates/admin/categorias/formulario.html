<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/head :: head('Nueva categoría')}"></head>
<body>

<div th:replace="~{admin/fragments/header :: header}"></div>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

            <h1 class="h2 mb-4"><i class="bi bi-grid me-2 text-warning"></i>Nueva categoría</h1>

            <div th:if="${error}" class="alert alert-danger d-flex align-items-center mb-4" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${error}"></span>
            </div>

            <div class="card border-secondary" style="max-width:600px;">
                <div class="card-body p-4">
                    <form th:action="@{/admin/categorias/new}" th:object="${categoria}" method="post">

                        <div class="mb-3">
                            <label for="nombre" class="form-label text-white">Nombre <span class="text-danger">*</span></label>
                            <input type="text" id="nombre" th:field="*{nombre}"
                                   class="form-control bg-dark text-white border-secondary"
                                   placeholder="Nombre de la categoría">
                        </div>

                        <div class="mb-3">
                            <label for="descripcion" class="form-label text-white">Descripción</label>
                            <textarea id="descripcion" th:field="*{descripcion}" rows="3"
                                      class="form-control bg-dark text-white border-secondary"
                                      placeholder="Descripción de la categoría"></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="imagen" class="form-label text-white">Imagen <span class="small text-white">(nombre de fichero)</span></label>
                            <input type="text" id="imagen" th:field="*{imagen}"
                                   class="form-control bg-dark text-white border-secondary"
                                   placeholder="ej: deportes.jpg">
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i>Guardar
                            </button>
                            <a th:href="@{/admin/categorias}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-1"></i>Cancelar
                            </a>
                        </div>

                    </form>
                </div>
            </div>

        </main>
    </div>
</div>

</body>
</html>
